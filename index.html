<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Architect-Eye | Sovereign Orchestrator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sovereign-card">
        <header>
            <h1 class="gradient-text">ARCHITECT-EYE OS</h1>
        </header>

        <section id="system-status-container">
            <div id="status-feed" class="live-status-box">Loading...</div>
        </section>

        <div id="hive-visualization" class="agent-grid"></div>

        <footer>
            <p>"The future is not coded; it is architected."</p>
        </footer>
    </div>

    <script>
        async function updateFeed() {
            const res = await fetch('status.txt');
            const txt = await res.text();
            document.getElementById('status-feed').innerText = txt;
        }
        setInterval(updateFeed, 5000);
        updateFeed();
    </script>
    <script src="script.js"></script>
</body>
</html>
