<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect-Eye | Sovereign Orchestrator</title>
    <link rel="stylesheet" href="../assets/theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sovereign-card">
        <header>
            <h1 class="gradient-text">ARCHITECT-EYE OS</h1>
            <p>Sovereign Orchestration Node // 2026 Edition</p>
        </header>

        <section id="system-status">
            <div class="status-indicator">
                <span class="dot status-active"></span>
                <span>System Integrity: <strong id="integrity-level">100%</strong></span>
            </div>
        </section>

        <main>
            <div class="grid-layout">
                <div class="agent-grid">
                    <p>Hive Mind Cluster Active: 12/12 Agents Operational</p>
                    <div id="hive-visualization">
                        </div>
                </div>
            </div>
        </main>

        <footer>
            <p>"The future is not coded; it is architected."</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
