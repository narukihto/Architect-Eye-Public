# Architect-Eye: Public Status Synchronization
# Path: Architect-Eye-Public/.github/workflows/sync_status.yml

name: Sync System Status

on:
  repository_dispatch:
    types: [core_integrity_verified]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      - name: Update Health Data
        run: |
          # نتحقق من نوع الحدث
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            status="${{ github.event.client_payload.status }}"
            origin="${{ github.event.client_payload.origin }}"
            echo "Processing Dispatch: $status from $origin"
            mkdir -p site
            echo "System Status: $status | Origin: $origin | Last Sync: $(date)" > site/status.txt
          else
            echo "Manual or Scheduled trigger. Skipping update to preserve integrity."
          fi

      - name: Commit and Push Update
        run: |
          git config --global user.name "Architect-Eye-Sync"
          git config --global user.email "sync@architect-eye.com"
          
          # نتحقق فقط إذا كان هناك تغيير فعلي في الملف
          if [ -f "site/status.txt" ] && [ -n "$(git status --porcelain site/status.txt)" ]; then
            git add site/status.txt
            git commit -m "chore: Status updated by Private Core [Auto-Generated]"
            git push origin main
          else
            echo "No status changes or non-dispatch event. Skipping push."
          fi
