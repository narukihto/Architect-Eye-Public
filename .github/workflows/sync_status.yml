# Architect-Eye: Public Status Synchronization
# Path: Architect-Eye-Public/.github/workflows/sync_status.yml

name: Sync System Status

on:
  repository_dispatch:
    types: [core_integrity_verified]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      - name: Update Health Data
        run: |
          # استخراج البيانات من الـ payload الذي أرسله المستودع الخاص
          # إذا لم يكن هناك payload، نضع قيمة افتراضية "Pending"
          status="${{ github.event.client_payload.status || 'Pending' }}"
          origin="${{ github.event.client_payload.origin || 'Unknown' }}"
          
          echo "Processing: $status from $origin"
          
          # إنشاء مجلد site إذا لم يكن موجوداً
          mkdir -p site
          echo "System Status: $status | Origin: $origin | Last Sync: $(date)" > site/status.txt

      - name: Commit and Push Update
        run: |
          git config --global user.name "Architect-Eye-Sync"
          git config --global user.email "sync@architect-eye.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add site/status.txt
            git commit -m "chore: Status updated by Private Core: $status [Auto-Generated]"
            git push origin main
          else
            echo "No status changes detected."
          fi
