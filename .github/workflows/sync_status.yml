# Architect-Eye: Public Status Synchronization
# Path: Architect-Eye-Public/.github/workflows/sync_status.yml

name: Sync System Status

on:
  # التغيير الجوهري: الاستماع للإشارة القادمة من المستودع الخاص
  repository_dispatch:
    types: [core_integrity_verified]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      - name: Update Health Data
        run: |
          # استخراج الحالة من الـ Payload المرسل من المستودع الخاص
          status="${{ github.event.client_payload.status }}"
          origin="${{ github.event.client_payload.origin }}"
          
          echo "Status: $status | Origin: $origin"
          echo "System Status: $status (Last Verified: $(date))" > site/status.txt

      - name: Commit and Push Update
        run: |
          git config --global user.name "Architect-Eye-Sync"
          git config --global user.email "sync@architect-eye.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add site/status.txt
            git commit -m "chore: Status updated via Private Core Signal [Auto-Generated]"
            git push origin main
          else
            echo "No status changes detected."
          fi
