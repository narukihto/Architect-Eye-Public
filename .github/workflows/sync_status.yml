# Architect-Eye: Public Status Synchronization
# Path: Architect-Eye-Public/.github/workflows/sync_status.yml

name: Sync System Status

on:
  # تم حذف workflow_dispatch تماماً لضمان عدم التشغيل اليدوي
  repository_dispatch:
    types: [core_integrity_verified]

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      - name: Update Health Data
        run: |
          # استخراج البيانات من ملف الحدث
          status=$(jq -r '.client_payload.status // "Unknown"' $GITHUB_EVENT_PATH)
          origin=$(jq -r '.client_payload.origin // "Unknown"' $GITHUB_EVENT_PATH)
          
          echo "Processing Dispatch: $status from $origin"
          mkdir -p site
          echo "System Status: $status | Origin: $origin | Last Sync: $(date)" > site/status.txt

      - name: Commit and Push Update
        run: |
          git config --global user.name "Architect-Eye-Sync"
          git config --global user.email "sync@architect-eye.com"
          
          if [ -n "$(git status --porcelain site/status.txt)" ]; then
            git add site/status.txt
            git commit -m "chore: System status auto-sync [Auto-Generated]"
            git push origin main
          else
            echo "No status changes detected. Skipping push."
          fi
