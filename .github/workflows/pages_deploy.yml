# Architect-Eye: Public Throne Deployment
# Path: Architect-Eye-Public/.github/workflows/pages_deploy.yml
# Purpose: Deploys Sovereign Dashboard from the /site directory.

name: Deploy Sovereign Dashboard

on:
  repository_dispatch:
    types: [core_integrity_verified]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # تم تغيير المسار هنا ليشير إلى المجلد الذي يحتوي على ملفات الموقع
          path: 'site/'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
