# Architect-Eye: Public Throne Deployment
# Path: Architect-Eye-Public/.github/workflows/pages_deploy.yml

name: Deploy Sovereign Dashboard

on:
  repository_dispatch:
    types: [core_integrity_verified] # هنا يكمن الربط، هذا يستمع للإشارة القادمة

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
